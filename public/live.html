<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>線上直播 - 御園國小</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark:#1a5c3a; --green-mid:#2e8b57;
      --gold:#f5b400; --red:#e5484d;
      --white:#fff; --gray-bg:#f4f7f5;
      --text-dark:#1a2b1f; --text-light:#6b8f71;
      --font-title:'Noto Serif TC',serif; --font-body:'Noto Sans TC',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{overflow-x:hidden;width:100%;}
    body{font-family:var(--font-body);background:var(--gray-bg);color:var(--text-dark);min-height:100vh;width:100%;overflow-x:hidden;}

    .top-nav{
      background:linear-gradient(135deg,var(--green-dark),var(--green-mid));
      color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px;
    }
    .nav-logo{width:36px;height:36px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-title);font-weight:700;font-size:16px;color:var(--green-dark);flex-shrink:0;}
    .nav-title{font-size:1rem;font-weight:700;letter-spacing:.5px;}
    .nav-back{margin-left:auto;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 16px;border-radius:20px;font-size:.82rem;cursor:pointer;text-decoration:none;transition:.2s;}
    .nav-back:hover{background:rgba(255,255,255,.25);}

    .wrap{max-width:920px;margin:0 auto;padding:28px 20px 60px;}

    .live-badge-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .live-badge{
      display:flex;align-items:center;gap:6px;
      background:var(--red);color:#fff;font-size:.78rem;font-weight:700;
      padding:5px 12px;border-radius:20px;letter-spacing:.5px;
    }
    .live-badge .dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1.4s ease infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
    .live-status-text{font-size:.85rem;color:var(--text-light);}

    .video-wrap{
      background:#000;border-radius:14px;overflow:hidden;
      aspect-ratio:16/9;box-shadow:0 8px 32px rgba(0,0,0,.15);
      position:relative;
    }
    #remote-video{width:100%;height:100%;object-fit:contain;display:block;}

    .btn-fullscreen{
      position:absolute;right:14px;bottom:14px;
      width:38px;height:38px;border-radius:8px;
      background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.25);
      color:#fff;font-size:1.15rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .2s ease;z-index:5;
    }
    .btn-fullscreen:hover{background:rgba(0,0,0,.75);}

    .btn-dvr-rewind{
      position:absolute;left:14px;bottom:14px;
      background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.3);
      color:#fff;font-size:.82rem;font-weight:600;
      padding:8px 16px;border-radius:20px;cursor:pointer;
      display:none;align-items:center;gap:6px;
      transition:background .2s ease;z-index:5;
    }
    .btn-dvr-rewind:hover{background:rgba(0,0,0,.8);}
    .btn-dvr-live{background:rgba(229,72,77,.85);border-color:rgba(255,255,255,.4);}
    .btn-dvr-live:hover{background:rgba(229,72,77,1);}

    /* 全螢幕模式下讓影片填滿整個螢幕，不受外層排版限制 */
    .video-wrap:fullscreen{
      aspect-ratio:unset;border-radius:0;
      display:flex;align-items:center;justify-content:center;
    }
    .video-wrap:fullscreen #remote-video{width:100%;height:100%;}
    .video-wrap:-webkit-full-screen{aspect-ratio:unset;border-radius:0;}
    .video-wrap:-webkit-full-screen #remote-video{width:100%;height:100%;}

    .offline-screen{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:14px;color:#9aa3a0;
      background:linear-gradient(160deg,#1a2420,#0f1512);
    }
    .offline-icon{font-size:3rem;opacity:.6;}
    .offline-title{font-size:1.05rem;font-weight:600;color:#d4dad7;}
    .offline-sub{font-size:.85rem;color:#7d8884;}
    .btn-replay{
      margin-top:6px;background:rgba(46,139,87,.18);border:1px solid rgba(46,139,87,.4);
      color:#bdeccb;padding:9px 22px;border-radius:24px;font-size:.85rem;font-weight:600;
      cursor:pointer;transition:background .2s ease;font-family:var(--font-body);
    }
    .btn-replay:hover{background:rgba(46,139,87,.3);}

    .info-bar{
      display:flex;align-items:center;justify-content:space-between;
      margin-top:14px;padding:14px 18px;background:var(--white);
      border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.05);
      flex-wrap:wrap;gap:10px;
    }
    .viewer-count{font-size:.85rem;color:var(--text-light);display:flex;align-items:center;gap:6px;}
    .unmute-hint{
      font-size:.82rem;color:var(--green-mid);font-weight:600;cursor:pointer;
      display:none;align-items:center;gap:6px;
    }
    .unmute-hint.show{display:flex;}
    .back-live-link{
      font-size:.82rem;color:var(--green-mid);font-weight:600;cursor:pointer;
      display:none;align-items:center;gap:6px;
    }

    @media(max-width:600px){
      .wrap{padding:18px 14px 40px;}
      .top-nav{padding:12px 16px;}
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-logo">御</div>
  <span class="nav-title">御園國小 線上直播</span>
  <a href="/" class="nav-back">← 返回首頁</a>
</nav>

<div class="wrap">

  <div class="live-badge-row">
    <span class="live-badge" id="live-badge" style="display:none;">
      <span class="dot"></span> LIVE
    </span>
    <span class="live-status-text" id="status-text">連線中，請稍候...</span>
  </div>

  <div class="video-wrap" id="video-wrap">
    <video id="remote-video" autoplay playsinline></video>
    <video id="replay-video" controls playsinline style="display:none;width:100%;height:100%;"></video>
    <video id="dvr-video" controls playsinline style="display:none;width:100%;height:100%;"></video>
    <div class="offline-screen" id="offline-screen">
      <div class="offline-icon">📡</div>
      <div class="offline-title">目前沒有進行中的直播</div>
      <div class="offline-sub" id="offline-sub">直播開始後此畫面會自動連線</div>
      <button class="btn-replay" id="btn-replay" onclick="watchReplay()" style="display:none;">▶ 觀看上次直播回放</button>
    </div>
    <button class="btn-dvr-rewind" id="btn-dvr-back" onclick="rewindToDvr()" style="display:none;" title="拖回去看剛剛的畫面">⏪ 往前拖看剛剛</button>
    <button class="btn-dvr-rewind btn-dvr-live" id="btn-dvr-live" onclick="backToLiveEdge()" style="display:none;" title="回到直播最前緣">🔴 跳回直播現場</button>
    <button class="btn-fullscreen" id="btn-fullscreen" onclick="toggleFullscreen()" title="全螢幕">⛶</button>
  </div>

  <div class="info-bar">
    <span class="viewer-count" id="mode-label">👁 即時觀看人數可於直播時顯示</span>
    <span class="unmute-hint" id="unmute-hint" onclick="unmuteVideo()">🔇 點此開啟聲音</span>
    <span class="back-live-link" id="back-live-link" onclick="backToLive()" style="display:none;">← 返回直播</span>
  </div>

</div>

<script>
let ws = null
let pc = null
const ICE_SERVERS = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }

function setOffline() {
  document.getElementById('offline-screen').style.display = 'flex'
  document.getElementById('live-badge').style.display = 'none'
  document.getElementById('status-text').textContent = '目前沒有進行中的直播'
  document.getElementById('unmute-hint').classList.remove('show')
  if (pc) { pc.close(); pc = null }
  const video = document.getElementById('remote-video')
  video.srcObject = null
  const dvrVideo = document.getElementById('dvr-video')
  const wasInDvrMode = dvrVideo.style.display !== 'none'
  stopDvrBuffer()
  document.getElementById('btn-dvr-back').style.display = 'none'
  document.getElementById('btn-dvr-live').style.display = 'none'
  if (wasInDvrMode) backToLiveEdge()
  checkReplayAvailable()
}

function setOnline() {
  document.getElementById('offline-screen').style.display = 'none'
  document.getElementById('live-badge').style.display = 'flex'
  document.getElementById('status-text').textContent = '直播進行中'
  document.getElementById('mode-label').textContent = '👁 即時觀看人數可於直播時顯示'
  document.getElementById('back-live-link').style.display = 'none'
  // 若正在看回放，切回即時直播畫面
  const replayVideo = document.getElementById('replay-video')
  if (replayVideo.style.display !== 'none') {
    replayVideo.pause()
    replayVideo.style.display = 'none'
    document.getElementById('remote-video').style.display = 'block'
  }
}

// ── 回放 ──────────────────────────────────────────────────
async function checkReplayAvailable() {
  try {
    const res = await fetch('/api/recording/latest')
    const data = await res.json()
    const btn = document.getElementById('btn-replay')
    const sub = document.getElementById('offline-sub')
    if (data.success && data.data) {
      btn.style.display = 'inline-block'
      const date = new Date(data.data.started_at).toLocaleString('zh-TW')
      sub.textContent = `最近一場直播：${date}`
    } else {
      btn.style.display = 'none'
    }
  } catch (e) {
    console.log('檢查回放失敗', e)
  }
}

async function watchReplay() {
  try {
    const latestRes = await fetch('/api/recording/latest')
    const latestData = await latestRes.json()
    if (!latestData.success || !latestData.data) {
      alert('目前沒有可觀看的回放')
      return
    }

    const recordingId = latestData.data.id
    const chunksRes = await fetch(`/api/recording/${recordingId}/chunks`)
    const chunksData = await chunksRes.json()
    if (!chunksData.success || !chunksData.urls || chunksData.urls.length === 0) {
      alert('此次錄影沒有可播放的內容')
      return
    }

    const replayVideo = document.getElementById('replay-video')
    const remoteVideo = document.getElementById('remote-video')
    remoteVideo.style.display = 'none'
    replayVideo.style.display = 'block'
    document.getElementById('offline-screen').style.display = 'none'
    document.getElementById('mode-label').textContent = '▶ 回放模式（可拖動進度條）'
    document.getElementById('back-live-link').style.display = 'flex'

    await playChunksWithMSE(replayVideo, chunksData.urls, chunksData.mimeType)
  } catch (e) {
    console.log(e)
    alert('載入回放失敗，請稍後再試')
  }
}

// 用 MediaSource Extensions 依序餵入所有片段，讓瀏覽器視為一條連續、可拖拉的串流
async function playChunksWithMSE(videoEl, urls, mimeType) {
  const type = mimeType || 'video/webm;codecs=vp9,opus'

  if (!window.MediaSource || !MediaSource.isTypeSupported(type)) {
    // 不支援 MSE 時退回最簡單的處理：至少播放第一段（不保證可拖拉）
    videoEl.src = urls[0]
    videoEl.play().catch(() => {})
    return
  }

  const mediaSource = new MediaSource()
  videoEl.src = URL.createObjectURL(mediaSource)

  mediaSource.addEventListener('sourceopen', async () => {
    const sourceBuffer = mediaSource.addSourceBuffer(type)
    let i = 0

    async function appendNext() {
      if (i >= urls.length) {
        if (mediaSource.readyState === 'open') {
          try { mediaSource.endOfStream() } catch (e) {}
        }
        return
      }
      try {
        const res = await fetch(urls[i])
        const buf = await res.arrayBuffer()
        i++
        sourceBuffer.appendBuffer(buf)
      } catch (e) {
        console.log('載入片段失敗', e)
        i++
        appendNext()
      }
    }

    sourceBuffer.addEventListener('updateend', appendNext)
    appendNext()
  })

  videoEl.play().catch(() => {})
}

function backToLive() {
  const replayVideo = document.getElementById('replay-video')
  replayVideo.pause()
  if (replayVideo.src) {
    URL.revokeObjectURL(replayVideo.src)
    replayVideo.removeAttribute('src')
    replayVideo.load()
  }
  replayVideo.style.display = 'none'
  document.getElementById('remote-video').style.display = 'block'
  document.getElementById('back-live-link').style.display = 'none'
  document.getElementById('mode-label').textContent = '👁 即時觀看人數可於直播時顯示'
  // 重新檢查目前是否為直播中或離線
  setOffline()
}

function connectSignaling() {
  const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:'
  ws = new WebSocket(`${protocol}//${window.location.host}/live-ws`)

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'viewer-join' }))
  }

  ws.onmessage = async (event) => {
    const msg = JSON.parse(event.data)

    if (msg.type === 'live-status') {
      if (msg.live) {
        setOnline()
      } else {
        setOffline()
      }
    }

    if (msg.type === 'offer' && msg.fromBroadcaster) {
      await handleOffer(msg.sdp)
    }

    if (msg.type === 'ice-candidate' && msg.fromBroadcaster) {
      if (pc && msg.candidate) {
        try { await pc.addIceCandidate(new RTCIceCandidate(msg.candidate)) } catch (e) {}
      }
    }
  }

  ws.onclose = () => {
    setTimeout(connectSignaling, 2000)
  }
}

// ── 直播 DVR：用 MSE 建立持續增長的緩衝視窗，可邊看邊累積新內容 ──
// 原理：不用即時 WebRTC 串流直接播放畫面，而是把同一條串流同時錄製成
// 一段一段的小片段，依序餵進 MediaSource 的 SourceBuffer。
// 這個 SourceBuffer 本身就是一條持續增長的時間軸：
//   - 使用者停在最前緣時，currentTime 自動跟著新片段一起往前走（等於在看直播）
//   - 使用者手動拖到前面時，自動跟隨就停止，可以自由拖動瀏覽剛剛的內容
//   - 超過保留時長的舊片段會被定期清除，避免緩衝區無限增長
let dvrMediaSource = null
let dvrSourceBuffer = null
let dvrRecorder = null
let dvrPendingQueue = []      // 等待 append 的片段佇列
let dvrAppending = false
let dvrMimeType = ''
let dvrChunkDuration = 2      // 每個片段秒數
const DVR_MAX_SECONDS = 1800  // 緩衝視窗最長保留秒數（30 分鐘）
let dvrUserSeeked = false     // 使用者是否手動拖動過（拖動後暫停自動追新）
let dvrHasStarted = false

function startDvrBuffer(stream) {
  stopDvrBuffer()

  const mimeCandidates = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm']
  dvrMimeType = mimeCandidates.find(t => MediaRecorder.isTypeSupported(t) && (window.MediaSource && MediaSource.isTypeSupported(t))) || ''
  if (!dvrMimeType || !window.MediaSource) {
    console.log('此瀏覽器不支援 DVR 緩衝功能，僅提供即時直播畫面')
    return
  }

  const dvrVideo = document.getElementById('dvr-video')
  dvrMediaSource = new MediaSource()
  dvrVideo.src = URL.createObjectURL(dvrMediaSource)
  dvrUserSeeked = false
  dvrHasStarted = false

  dvrMediaSource.addEventListener('sourceopen', () => {
    dvrSourceBuffer = dvrMediaSource.addSourceBuffer(dvrMimeType)
    dvrSourceBuffer.addEventListener('updateend', onDvrUpdateEnd)

    dvrRecorder = new MediaRecorder(stream, { mimeType: dvrMimeType })
    dvrRecorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) {
        dvrPendingQueue.push(e.data)
        flushDvrQueue()
      }
    }
    dvrRecorder.start(dvrChunkDuration * 1000)
    document.getElementById('btn-dvr-back').style.display = 'flex'
  })
}

async function flushDvrQueue() {
  if (dvrAppending || !dvrSourceBuffer || dvrSourceBuffer.updating) return
  if (dvrPendingQueue.length === 0) return
  const blob = dvrPendingQueue.shift()
  const buf = await blob.arrayBuffer()
  dvrAppending = true
  try {
    dvrSourceBuffer.appendBuffer(buf)
  } catch (e) {
    dvrAppending = false
    console.log('DVR 寫入片段失敗', e)
  }
}

function onDvrUpdateEnd() {
  dvrAppending = false

  // 維持滑動視窗：移除超過保留時長的舊內容，避免記憶體無限增長
  try {
    if (dvrSourceBuffer.buffered.length > 0) {
      const start = dvrSourceBuffer.buffered.start(0)
      const end = dvrSourceBuffer.buffered.end(dvrSourceBuffer.buffered.length - 1)
      if (end - start > DVR_MAX_SECONDS) {
        dvrSourceBuffer.remove(start, end - DVR_MAX_SECONDS)
      }
    }
  } catch (e) {}

  // 若使用者沒有手動拖動，持續跟著最新內容走（等同於正在看直播）
  const dvrVideo = document.getElementById('dvr-video')
  if (!dvrUserSeeked && dvrSourceBuffer.buffered.length > 0) {
    const end = dvrSourceBuffer.buffered.end(dvrSourceBuffer.buffered.length - 1)
    if (!dvrHasStarted) {
      dvrVideo.currentTime = end
      dvrVideo.play().catch(() => {})
      dvrHasStarted = true
    } else if (dvrVideo.paused === false && end - dvrVideo.currentTime > dvrChunkDuration * 3) {
      // 落後太多時直接跳到最新（避免緩衝不足造成的卡頓持續累積延遲）
      dvrVideo.currentTime = end - 0.3
    }
  }

  flushDvrQueue()
}

function stopDvrBuffer() {
  if (dvrRecorder && dvrRecorder.state !== 'inactive') {
    try { dvrRecorder.stop() } catch (e) {}
  }
  dvrRecorder = null
  dvrPendingQueue = []
  dvrAppending = false
  if (dvrMediaSource && dvrMediaSource.readyState === 'open') {
    try { dvrMediaSource.endOfStream() } catch (e) {}
  }
  dvrMediaSource = null
  dvrSourceBuffer = null
  const btn = document.getElementById('btn-dvr-back')
  if (btn) btn.style.display = 'none'
}

// 切到 DVR 畫面：顯示緩衝中的 video，使用者可自由拖動進度條
function rewindToDvr() {
  if (!dvrSourceBuffer || dvrSourceBuffer.buffered.length === 0) {
    alert('目前還沒有足夠的緩存內容可以拖回去看')
    return
  }
  const remoteVideo = document.getElementById('remote-video')
  const dvrVideo = document.getElementById('dvr-video')
  remoteVideo.style.display = 'none'
  dvrVideo.style.display = 'block'
  document.getElementById('mode-label').textContent = '⏪ 直播回看中（可拖動進度條，持續累積最新內容）'
  document.getElementById('btn-dvr-back').style.display = 'none'
  document.getElementById('btn-dvr-live').style.display = 'flex'

  // 使用者手動拖動進度條時，暫停自動追新，讓他可以安心瀏覽
  dvrVideo.onseeking = () => { dvrUserSeeked = true }
  // 若使用者拖到非常接近最前緣（3 秒內），視為想回到直播，恢復自動追新
  dvrVideo.onseeked = () => {
    if (dvrSourceBuffer && dvrSourceBuffer.buffered.length > 0) {
      const end = dvrSourceBuffer.buffered.end(dvrSourceBuffer.buffered.length - 1)
      dvrUserSeeked = (end - dvrVideo.currentTime) > 3
    }
  }
}

// 從 DVR 回看畫面切回純即時 WebRTC 畫面（不消耗額外資源做拖動，效能最佳）
function backToLiveEdge() {
  const dvrVideo = document.getElementById('dvr-video')
  dvrUserSeeked = false
  dvrVideo.style.display = 'none'
  document.getElementById('remote-video').style.display = 'block'
  document.getElementById('mode-label').textContent = '👁 即時觀看人數可於直播時顯示'
  document.getElementById('btn-dvr-back').style.display = dvrSourceBuffer ? 'flex' : 'none'
  document.getElementById('btn-dvr-live').style.display = 'none'
}

async function handleOffer(sdp) {
  if (pc) { pc.close() }
  pc = new RTCPeerConnection(ICE_SERVERS)

  pc.ontrack = (event) => {
    const video = document.getElementById('remote-video')
    if (video.srcObject !== event.streams[0]) {
      video.srcObject = event.streams[0]
      // 大多數瀏覽器要求自動播放必須先靜音，播放後提示使用者手動開聲音
      video.muted = true
      video.play().catch(() => {})
      document.getElementById('unmute-hint').classList.add('show')
      // 開始在背景緩存畫面，供使用者隨時拖回去看
      startDvrBuffer(event.streams[0])
    }
  }

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      ws.send(JSON.stringify({ type: 'ice-candidate', candidate: e.candidate }))
    }
  }

  await pc.setRemoteDescription(new RTCSessionDescription(sdp))
  const answer = await pc.createAnswer()
  await pc.setLocalDescription(answer)
  ws.send(JSON.stringify({ type: 'answer', sdp: answer }))

  setOnline()
}

function unmuteVideo() {
  const video = document.getElementById('remote-video')
  video.muted = false
  document.getElementById('unmute-hint').classList.remove('show')
}

// ── 全螢幕 ────────────────────────────────────────────────
function toggleFullscreen() {
  const wrap = document.getElementById('video-wrap')
  const video = document.getElementById('remote-video')
  const isFs = document.fullscreenElement || document.webkitFullscreenElement

  if (isFs) {
    if (document.exitFullscreen) document.exitFullscreen()
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen()
    return
  }

  if (wrap.requestFullscreen) {
    wrap.requestFullscreen()
  } else if (wrap.webkitRequestFullscreen) {
    wrap.webkitRequestFullscreen() // 桌面 Safari
  } else if (video.webkitEnterFullscreen) {
    video.webkitEnterFullscreen() // iOS Safari：僅 video 元素本身支援全螢幕
  }
}

// 雙擊影片快速進入/退出全螢幕
document.getElementById('remote-video').addEventListener('dblclick', toggleFullscreen)

connectSignaling()
</script>
</body>
</html>
